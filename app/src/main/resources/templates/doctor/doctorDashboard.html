<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Doctor Dashboard</title>
  <link rel="icon" th:href="@{/assets/img/favicon.ico}" />
  <link rel="stylesheet" th:href="@{/assets/css/style.css}" />
  <link rel="stylesheet" th:href="@{/assets/css/adminDashboard.css}" />
  <link rel="stylesheet" th:href="@{/assets/css/doctorDashboard.css}" />

  <!-- Utility & Component Scripts -->
  <script th:src="@{/js/util.js}" defer></script>
  <script th:src="@{/js/render.js}" defer></script>
  <script th:src="@{/js/components/header.js}" defer></script>
  <script th:src="@{/js/components/footer.js}" defer></script>
  <script th:src="@{/js/components/patientRows.js}" defer></script>

  <!-- Services -->
  <script type="module" th:src="@{/js/services/patientServices.js}" defer></script>
  <script type="module" th:src="@{/js/services/doctorDashboard.js}" defer></script>
</head>

<body>
  <div class="container">
    <div class="wrapper">
      <div id="header"></div>

      <main class="main-content">
        <div class="top-controls">
          <input type="text" id="searchBar" placeholder="Search by patient name or ID" />
          <button id="todayAppointments">Today's Appointments</button>
          <input type="date" id="appointmentDate" />
        </div>

        <table id="patientTable">
          <thead>
            <tr>
              <th>Patient ID</th>
              <th>Name</th>
              <th>Phone</th>
              <th>Email</th>
              <th>Prescription</th>
            </tr>
          </thead>
          <tbody id="patientTableBody">
            <!-- Populated dynamically by patientRows.js -->
          </tbody>
        </table>

        <div id="noPatientRecord" class="noPatientRecord" style="display: none;">
          No patient records available for selected date.
        </div>
      </main>

      <div id="footer"></div>
    </div>
  </div>
</body>
</html>
