<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Select Role - Clinic Management</title>
  <link rel="icon" href="../assets/img/favicon.ico" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/defineRole.css" />
  <link rel="stylesheet" href="../assets/css/style.css" />
</head>
<body>
  <div id="header"></div>

  <main class="container main-content">
    <div class="wrapper text-center">
      <h2>Select Your Role</h2>
      <div class="role-buttons mt-4">
        <button id="adminBtn" class="btn btn-primary me-3">Admin</button>
        <button id="doctorBtn" class="btn btn-success me-3">Doctor</button>
        <button id="patientBtn" class="btn btn-info">Patient</button>
      </div>
    </div>
  </main>

  <!-- Modal -->
  <div id="modal" class="modal" style="display:none;">
    <div class="modal-content">
      <span id="closeModal" class="close">&times;</span>
      <div id="modal-body"></div>
    </div>
  </div>

  <div id="footer"></div>

  <!-- Scripts -->
  <script src="../js/util.js" defer></script>
  <script src="../js/render.js" defer></script>
  <script src="../js/components/header.js" defer></script>
  <script src="../js/components/footer.js" defer></script>
  <script type="module" src="../js/services/defineRole.js" defer></script>
</body>
</html>
