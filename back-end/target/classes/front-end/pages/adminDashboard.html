<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Admin Dashboard</title>
  <link rel="icon" href="../assets/favicon.ico" />
  
  <!-- Bootstrap CSS -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />

  <!-- Custom CSS -->
  <link rel="stylesheet" href="../assets/css/adminDashboard.css" />
  <link rel="stylesheet" href="../assets/css/style.css" />
</head>
<body>
  <div class="container">
    <div class="wrapper">
      <!-- Header -->
      <div id="header"></div>

      <!-- Main Content -->
      <main class="main-content py-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
          <input
            type="text"
            id="searchBar"
            class="form-control me-2"
            placeholder="Search doctors..."
            style="max-width: 300px"
          />
          <div class="d-flex gap-2">
            <select id="filterTime" class="form-select">
              <option value="">Sort by Time</option>
              <option value="morning">Morning</option>
              <option value="afternoon">Afternoon</option>
              <option value="evening">Evening</option>
            </select>
            <select id="filterSpecialty" class="form-select">
              <option value="">Filter by Specialty</option>
              <option value="cardiologist">Cardiologist</option>
              <option value="neurologist">Neurologist</option>
              <option value="dermatologist">Dermatologist</option>
            </select>
          </div>
          <button id="addDoctorBtn" class="btn btn-success">Add Doctor</button>
        </div>

        <div id="content" class="row g-3"></div>
      </main>

      <!-- Footer -->
      <div id="footer" class="mt-4"></div>
    </div>
  </div>

  <!-- Modal -->
  <div id="modal" class="modal">
    <span id="closeModal" class="close">&times;</span>
    <div id="modal-body"></div>
  </div>

  <!-- Bootstrap JS Bundle -->
  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"
    defer
  ></script>

  <!-- Utilities -->
  <script src="../js/util.js" defer></script>
  <script src="../js/render.js" defer></script>

  <!-- Components -->
  <script src="../js/components/header.js" defer></script>
  <script src="../js/components/footer.js" defer></script>

  <!-- Admin Dashboard Service -->
  <script type="module" src="../js/services/adminDashboard.js" defer></script>
</body>
</html>
