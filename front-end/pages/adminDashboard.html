<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Admin Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="../assets/css/adminDashboard.css" />
</head>
<body>

  <!-- Header -->
  <script type="module">
    import { renderHeader } from '../js/components/header.js';
    renderHeader();
  </script>

  <div class="container mt-4">
    <h2>Manage Doctors</h2>

    <!-- Filter & Add Doctor -->
    <div class="filters d-flex flex-wrap align-items-center mb-3">
      <input type="text" class="form-control me-2" placeholder="Search doctor..." />
      <select class="form-select me-2">
        <option value="">All Specialties</option>
        <option value="cardiology">Cardiology</option>
        <option value="neurology">Neurology</option>
      </select>
      <button class="btn btn-primary ms-auto" data-bs-toggle="modal" data-bs-target="#addDoctorModal">Add Doctor</button>
    </div>

    <!-- Doctor Cards -->
    <div id="doctorList" class="row">
      <!-- JS dynamically inserts cards here -->
    </div>
  </div>

  <!-- Add Doctor Modal -->
  <div class="modal fade" id="addDoctorModal" tabindex="-1" aria-labelledby="addDoctorLabel" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <form>
          <div class="modal-header">
            <h5 class="modal-title" id="addDoctorLabel">Add New Doctor</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body">
            <input type="text" class="form-control mb-2" placeholder="Doctor Name" required />
            <input type="text" class="form-control mb-2" placeholder="Specialty" required />
            <input type="text" class="form-control mb-2" placeholder="Availability (e.g. Mon-Fri 9AM-5PM)" required />
          </div>
          <div class="modal-footer">
            <button type="submit" class="btn btn-success">Add Doctor</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <script type="module">
    import { renderFooter } from '../js/components/footer.js';
    renderFooter();
  </script>

  <!-- JS Bootstrap & doctorCard logic -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module">
    import { createDoctorCard } from '../js/components/doctorCard.js';

    const doctorList = document.getElementById("doctorList");
    const doctors = [
      { name: "Dr. Smith", specialty: "Cardiology", availability: "Mon-Fri 9AM-5PM" },
      { name: "Dr. Jane", specialty: "Neurology", availability: "Tue-Thu 10AM-4PM" }
    ];

    doctors.forEach(doc => {
      const card = createDoctorCard(doc);
      const col = document.createElement("div");
      col.className = "col-md-4";
      col.appendChild(card);
      doctorList.appendChild(col);
    });
  </script>

</body>
</html>
