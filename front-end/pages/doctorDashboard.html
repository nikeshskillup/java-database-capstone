<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Doctor Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="../assets/css/doctorDashboard.css" />
</head>
<body>

  <!-- Header -->
  <script type="module">
    import { renderHeader } from '../js/components/header.js';
    renderHeader();
  </script>

  <div class="container mt-4">
    <h2>Patient Appointments</h2>

    <!-- Filter -->
    <div class="row mb-3">
      <div class="col-md-4">
        <input type="date" class="form-control" placeholder="Filter by date" />
      </div>
      <div class="col-md-4">
        <select class="form-select">
          <option value="">All Statuses</option>
          <option value="pending">Pending</option>
          <option value="completed">Completed</option>
        </select>
      </div>
    </div>

    <!-- Patient Appointments Table -->
    <div class="table-responsive">
      <table class="table table-bordered table-striped align-middle">
        <thead class="table-dark">
          <tr>
            <th>Patient Name</th>
            <th>Date</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td>John Doe</td>
            <td>2025-05-30</td>
            <td>Pending</td>
            <td>
              <button class="btn btn-sm btn-prescription">Add Prescription</button>
              <button class="btn btn-sm btn-secondary">View Record</button>
            </td>
          </tr>
          <tr>
            <td>Jane Smith</td>
            <td>2025-06-01</td>
            <td>Completed</td>
            <td>
              <button class="btn btn-sm btn-secondary">View Record</button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- Footer -->
  <script type="module">
    import { renderFooter } from '../js/components/footer.js';
    renderFooter();
  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
