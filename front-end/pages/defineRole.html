<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Select Role</title>
  <link rel="stylesheet" href="../assets/css/defineRole.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

  <div class="container text-center mt-5">
    <h1>Select Your Role</h1>
    <div class="d-flex justify-content-center gap-3 mt-4">
      <button class="btn btn-primary role-btn" data-role="admin">Admin</button>
      <button class="btn btn-success role-btn" data-role="doctor">Doctor</button>
      <button class="btn btn-info role-btn" data-role="patient">Patient</button>
    </div>
  </div>

  <script>
    document.querySelectorAll('.role-btn').forEach(button => {
      button.addEventListener('click', () => {
        localStorage.setItem("userRole", button.getAttribute("data-role"));
        // Redirect to login or role dashboard (dummy link for now)
        window.location.href = "./login.html";
      });
    });
  </script>

</body>
</html>
